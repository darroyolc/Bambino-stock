name: Bambino Stock Check
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bambino_stock_bot.py
      - run: |
          git config user.name "stock-bot"
          git config user.email "stock-bot@users.noreply.github.com"
          git add stock_state.json
          git diff --cached --quiet || git commit -m "Actualizar estado [skip ci]"
          git push
